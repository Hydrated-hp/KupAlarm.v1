<!DOCTYPE html>
<html>
<head>
<title>KupAlarm v3</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
text-align:center;
margin-top:40px;
}

.container{
background:#1e1e1e;
padding:30px;
border-radius:12px;
width:380px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{color:#ff5252;}

input,button{
padding:10px;
margin:10px;
font-size:16px;
border-radius:5px;
border:none;
}

button{
background:#ff5252;
color:white;
cursor:pointer;
}

button:hover{
background:#ff3030;
}

#questionBox{display:none;}
#resultBox{display:none;}

video{
margin-top:15px;
border-radius:10px;
display:none;
width:100%;
}

.stat{
color:#ccc;
margin:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>KupAlarm ⏰</h1>

<h3 id="status"></h3>

<div id="questionBox">

<h2 id="question"></h2>

<input type="number" id="answer">

<br>

<button onclick="checkAnswer()">Submit</button>

<p id="progress"></p>

</div>

<div id="resultBox">

<h2>Alarm Stopped ✅</h2>

<p class="stat" id="timeTaken"></p>
<p class="stat" id="fastest"></p>
<p class="stat" id="average"></p>
<p class="stat" id="attempts"></p>

<br>

<button onclick="goHome()">Go Back Home</button>

</div>

<video id="alarmVideo" loop autoplay muted playsinline preload="auto">
<source src="IMG_1319.mp4" type="video/mp4">
</video>

</div>

<audio id="alarmSound" loop preload="auto">
<source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<script>

const urlParams=new URLSearchParams(window.location.search)

const alarmTime=urlParams.get('time')
const difficulty=urlParams.get('difficulty')
const questionsRequired=parseInt(urlParams.get('q'))||3

document.getElementById("status").innerText=
"Alarm set for "+alarmTime

let correctAnswer
let answered=0
let questionTimer=null
let alarmStarted=false
let alarmFinished=false
let startTime=0

// AUDIO UNLOCK (mobile fix)

let audioUnlocked=false

function unlockAudio(){

if(audioUnlocked) return

const sound=document.getElementById("alarmSound")

sound.play().then(()=>{

sound.pause()
sound.currentTime=0

audioUnlocked=true

}).catch(()=>{})

}

document.addEventListener("touchstart",unlockAudio,{once:true})
document.addEventListener("click",unlockAudio,{once:true})


// CLOCK CHECK

setInterval(()=>{

const now=new Date()

const currentTime=
now.getHours().toString().padStart(2,'0')+":"+
now.getMinutes().toString().padStart(2,'0')

if(currentTime===alarmTime && !alarmStarted){

alarmStarted=true
startAlarm()

}

},1000)


// START ALARM

function startAlarm(){

startTime=Date.now()

const sound=document.getElementById("alarmSound")
const video=document.getElementById("alarmVideo")

document.getElementById("questionBox").style.display="block"

video.style.display="block"

video.currentTime=0
video.play().catch(()=>{})

sound.currentTime=0
sound.volume=1
sound.play().catch(()=>{})

generateQuestion()

}


// GENERATE QUESTION

function generateQuestion(){

if(alarmFinished) return

let a,b
const q=document.getElementById("question")

if(difficulty=="easy"){

a=Math.floor(Math.random()*10)
b=Math.floor(Math.random()*10)

correctAnswer=a+b
q.innerText=a+" + "+b+" = ?"

}

else if(difficulty=="medium"){

a=Math.floor(Math.random()*50)
b=Math.floor(Math.random()*50)

correctAnswer=a+b
q.innerText=a+" + "+b+" = ?"

}

else if(difficulty=="hard"){

a=Math.floor(Math.random()*12)
b=Math.floor(Math.random()*12)

correctAnswer=a*b
q.innerText=a+" × "+b+" = ?"

}

else{

a=Math.floor(Math.random()*100)
b=Math.floor(Math.random()*50)

correctAnswer=a-b
q.innerText=a+" - "+b+" = ?"

}

document.getElementById("progress").innerText=
"Question "+(answered+1)+" of "+questionsRequired

document.getElementById("answer").focus()

clearTimeout(questionTimer)

questionTimer=setTimeout(generateQuestion,4000)

}


// CHECK ANSWER

function checkAnswer(){

if(alarmFinished) return

let userAnswer=parseInt(
document.getElementById("answer").value
)

if(userAnswer===correctAnswer){

answered++

document.getElementById("answer").value=""

if(answered>=questionsRequired){

stopAlarm()

}else{

generateQuestion()

}

}

else{

alert("Wrong answer boss!")

}

}


// STOP ALARM

function stopAlarm(){

alarmFinished=true

clearTimeout(questionTimer)

const sound=document.getElementById("alarmSound")
const video=document.getElementById("alarmVideo")

sound.pause()
sound.currentTime=0

video.pause()
video.currentTime=0
video.style.display="none"

document.getElementById("questionBox").style.display="none"

let endTime=Date.now()

let totalTime=Math.floor((endTime-startTime)/1000)

saveStats(totalTime)

showResult(totalTime)

}


// SAVE STATS

function saveStats(time){

let stats=JSON.parse(localStorage.getItem("kupStats"))||[]

stats.push(time)

localStorage.setItem("kupStats",JSON.stringify(stats))

}


// SHOW RESULT

function showResult(time){

let stats=JSON.parse(localStorage.getItem("kupStats"))||[]

let fastest=Math.min(...stats)

let avg=stats.reduce((a,b)=>a+b,0)/stats.length

document.getElementById("resultBox").style.display="block"

document.getElementById("timeTaken").innerText=
"Your time: "+time+" seconds"

document.getElementById("fastest").innerText=
"Fastest: "+fastest+" seconds"

document.getElementById("average").innerText=
"Average: "+avg.toFixed(1)+" seconds"

document.getElementById("attempts").innerText=
"Total Attempts: "+stats.length

}


// HOME BUTTON

function goHome(){

window.location.href="index.html"

}


// ENTER KEY

document.getElementById("answer").addEventListener("keypress",function(e){

if(e.key==="Enter"){
checkAnswer()
}

})

</script>

</body>
</html>
