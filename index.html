<!DOCTYPE html>
<html>
<head>
  <title>KupAlarm PRO</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1>⏰ KupAlarm</h1>
    <p id="clock"></p>

    <input type="time" id="alarmTime">
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
      <option value="extreme">Extreme</option>
    </select>

    <button onclick="addAlarm()">Add Alarm</button>
    <button onclick="clearAlarms()">Clear All</button>
    <button onclick="toggleStats()">Toggle Stats</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h2>Your Alarms</h2>
    <div id="alarmList"></div>

    <div id="statsBox">
      <h3>Statistics</h3>
      <p id="fastest"></p>
      <p id="average"></p>
      <p id="attempts"></p>
      <p id="streak"></p>
      <canvas id="statsChart"></canvas>
    </div>
  </div>

</div>

<!-- ALARM SCREEN -->
<div id="alarmScreen">
  <h1>WAKE UP 🚨</h1>

  <video id="alarmVideo" loop>
    <source src="IMG_1319.mp4">
  </video>

  <audio id="alarmSound" loop>
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
  </audio>

  <div id="questionBox">
    <h2 id="question"></h2>
    <div id="choices"></div>
    <p id="progress"></p>
  </div>

  <button id="snoozeBtn" onclick="snooze()">Snooze (1x)</button>

</div>

<script src="script.js"></script>
</body>
</html>
